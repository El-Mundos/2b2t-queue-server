<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2b2t Queue</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>2b2t Queue</h1>
      <div class="header-right">
        <div class="status-pill" id="status-pill">idle</div>
        <a href="/logout" class="btn-logout">logout</a>
      </div>
    </header>

    <main>
      <div class="auth-card" id="auth-card" style="display:none">
        <div class="auth-title">Microsoft Login Required</div>
        <div class="auth-step">1. Open <a id="auth-url" href="https://microsoft.com/devicelogin" target="_blank">microsoft.com/devicelogin</a></div>
        <div class="auth-step">2. Enter this code:</div>
        <div class="auth-code" id="auth-code">——————</div>
        <button class="btn btn-primary" onclick="copyCode()">Copy code</button>
        <div class="auth-expires" id="auth-expires"></div>
      </div>

      <div class="queue-card" id="queue-card">
        <div class="queue-stats">
          <div>
            <div class="queue-label">Position</div>
            <div class="queue-number" id="queue-number">—</div>
          </div>
          <div>
            <div class="queue-label">Est. time</div>
            <div class="queue-eta" id="queue-eta">—</div>
          </div>
        </div>
      </div>

      <div class="info-row">
        <div class="info-block">
          <div class="info-label">State</div>
          <div class="info-value" id="state-value">idle</div>
        </div>
        <div class="info-block">
          <div class="info-label">Connection</div>
          <div class="info-value" id="ws-status">connecting…</div>
        </div>
      </div>

      <div class="actions">
        <button id="btn-start" class="btn btn-primary" onclick="apiCall('start')">Start</button>
        <button id="btn-stop" class="btn btn-danger" onclick="apiCall('stop')" disabled>Stop</button>
      </div>

      <div class="token-card">
        <div class="token-header">
          <span class="info-label">In-game token</span>
          <span class="token-hint">one-time · expires in 5 min</span>
        </div>
        <div class="token-display" id="token-display">
          <span id="token-value"></span>
        </div>
        <button class="btn btn-token" id="btn-token" onclick="generateToken()">Generate &amp; copy</button>
      </div>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
