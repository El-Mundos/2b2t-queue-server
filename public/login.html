<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2b2t Queue</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #e8e8e8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background-image: radial-gradient(ellipse 70% 50% at 50% 0%, rgba(59,130,246,0.13) 0%, transparent 70%);
    }

    .card {
      width: 100%;
      max-width: 360px;
      background: #141414;
      border-radius: 1.5rem;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.07);
      box-shadow: 0 0 0 1px rgba(59,130,246,0.08), 0 40px 80px rgba(0,0,0,0.7);
    }

    .brand {
      text-align: center;
      padding: 2.5rem 2rem 2.25rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      position: relative;
    }

    .brand::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #3b82f6, #818cf8, transparent);
    }

    .logo {
      font-size: 3.25rem;
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1;
      background: linear-gradient(135deg, #93c5fd 0%, #3b82f6 45%, #818cf8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .sub {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      color: #555;
      margin-top: 0.55rem;
    }

    .body {
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    input[type="password"] {
      width: 100%;
      background: #0a0a0a;
      border: 1px solid #252525;
      border-radius: 0.65rem;
      color: #e8e8e8;
      font-size: 1rem;
      padding: 0.85rem 1rem;
      outline: none;
      letter-spacing: 0.12em;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input[type="password"]:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }
    input[type="password"]::placeholder { color: #3a3a3a; letter-spacing: 0.05em; }

    .error {
      font-size: 0.8rem;
      color: #ef4444;
      text-align: center;
      display: none;
    }

    button {
      width: 100%;
      padding: 0.9rem;
      border: none;
      border-radius: 0.65rem;
      background: #3b82f6;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.02em;
    }
    button:hover  { opacity: 0.9; }
    button:active { transform: scale(0.98); }

    @keyframes shake {
      0%,100% { transform: translateX(0) }
      20%      { transform: translateX(-6px) }
      40%      { transform: translateX(6px) }
      60%      { transform: translateX(-4px) }
      80%      { transform: translateX(4px) }
    }
    .shake { animation: shake 0.35s ease; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="logo">2b2t</div>
      <div class="sub">Queue Proxy</div>
    </div>
    <form class="body" method="POST" action="/login">
      <input type="password" name="password" placeholder="Password" autofocus
             id="pw-input" autocomplete="current-password">
      <p class="error" id="error">Wrong password — try again</p>
      <button type="submit">Enter</button>
    </form>
  </div>
  <script>
    if (location.search.includes('error=1')) {
      document.getElementById('error').style.display = 'block'
      const inp = document.getElementById('pw-input')
      inp.classList.add('shake')
      inp.addEventListener('animationend', () => inp.classList.remove('shake'), { once: true })
    }
  </script>
</body>
</html>
