<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2b2t Queue</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
  <div class="container">
    <form class="login-card" method="POST" action="/login" id="form">
      <div class="login-brand">
        <div class="login-logo">2b2t</div>
        <div class="login-sub">Queue Proxy</div>
      </div>
      <div class="login-body">
        <input class="login-input" type="password" name="password"
               placeholder="Password" autofocus id="pw-input" autocomplete="current-password">
        <p class="login-error" id="error">Wrong password — try again</p>
        <button type="submit" class="btn btn-primary">Enter</button>
      </div>
    </form>
  </div>
  <script>
    if (location.search.includes('error=1')) {
      document.getElementById('error').style.display = 'block'
      const inp = document.getElementById('pw-input')
      inp.classList.add('shake')
      inp.addEventListener('animationend', () => inp.classList.remove('shake'), { once: true })
    }
  </script>
</body>
</html>
